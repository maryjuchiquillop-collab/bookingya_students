name: CI - Pruebas TDD y BDD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bookingya
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Crear application.properties
        run: |
          mkdir -p src/main/resources
          cat > src/main/resources/application.properties << EOF
          spring.datasource.url=jdbc:postgresql://localhost:5432/bookingya
          spring.datasource.username=postgres
          spring.datasource.password=admin123
          spring.datasource.driver-class-name=org.postgresql.Driver
          spring.jpa.hibernate.ddl-auto=update
          spring.jpa.show-sql=true
          spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
          server.port=8080
          EOF

      - name: Ejecutar pruebas TDD y BDD
        run: ./mvnw test

      - name: Generar reporte Serenity
        if: always()
        run: ./mvnw net.serenity-bdd.maven.plugins:serenity-maven-plugin:aggregate

      - name: Publicar reporte Serenity
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: serenity-report
          path: target/site/serenity/

      - name: Publicar reporte Cucumber
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report
          path: target/cucumber-reports/